<!DOCTYPE html>
<html>

<head>
    <title>Audio Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p>Analizando audio...</p>
    </div>
    <div class="container">

        <h2>Subir audio</h2>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="audio" accept=".wav,.mp3" required><br><br>

            <label for="nivel_filtro">Nivel de filtro</label>
            <input type="range" name="a" min="1" max="100" value="50"
                oninput="this.nextElementSibling.textContent = this.value">
            <span>50</span>
            <button type="submit">Procesar</button>
        </form>

        {% if input_audio %}
        <h3>Audio Original</h3>
        <audio controls>
            <source src="{{ url_for('audio', filename='input.wav') }}" type="audio/wav">
        </audio>

        <h3>Gráfica Original</h3>
        <img src="{{ url_for('static', filename=grafica_input) }}" width="500">

        <h3>Audio Filtrado</h3>
        <audio controls>
            <source src="{{ url_for('audio', filename='output.wav') }}" type="audio/wav">
        </audio>

        <h3>Gráfica Filtrada</h3>
        <img src="{{ url_for('static', filename=grafica_output) }}" width="500">
        {% endif %}

        <h3>Espectrograma Original</h3>
        <img src="{{ url_for('static', filename=grafica_spec_input) }}" width="500">

        <h3>Espectrograma Filtrado</h3>
        <img src="{{ url_for('static', filename=grafica_spec_output) }}" width="500">

    </div>
</body>

<script>
    const form = document.querySelector("form");
    const loader = document.getElementById("loader");

    form.addEventListener("submit", function () {
        loader.style.display = "block";

        // 🔥 opcional: desactivar botón
        const btn = form.querySelector("button");
        btn.disabled = true;
        btn.innerText = "Procesando...";
    });
</script>

</html>
